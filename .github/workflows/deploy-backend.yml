name: Deploy Backend to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-backend.yml"

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve backend image tag
        id: image
        run: |
          IMAGE_NAME="$(echo "${{ github.repository_owner }}/lifemaker-backend" | tr '[:upper:]' '[:lower:]')"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/$IMAGE_NAME:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ghcr.io/${{ steps.image.outputs.name }}:latest

      - name: Prepare backend env file
        run: |
          cat <<EOF > .env
          APP_PORT=${{ vars.APP_PORT || '8080' }}
          MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DATABASE=${{ vars.MONGO_DATABASE || 'lifemaker' }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          APP_CORS_ALLOWED_ORIGIN_PATTERNS=${{ vars.APP_CORS_ALLOWED_ORIGIN_PATTERNS || 'http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app' }}
          BACKEND_IMAGE=${{ steps.image.outputs.ref }}
          EOF

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend,docker-compose.yml,.env"
          target: "~/lifemaker"
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -eu
            cd ~/lifemaker
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            sudo docker compose -f docker-compose.yml pull backend
            sudo docker compose -f docker-compose.yml up -d --no-build --remove-orphans
            sudo docker image prune -f
